<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Admin Token</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>
    body {
            background-color: #C7C7C7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .registration-container {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            max-width: 450px;
            width: 100%;
        }

        .registration-container h2 {
            color: #333333;
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 0.5rem;
        }

        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
            width: 100%;
            border-radius: 0.5rem;
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }

        .alert {
            border-radius: 0.5rem;
        }
</style>
<body>
<div class="registration-container">
    <div class="login-container">
    <div class="text-center">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" width="200" height="200" class="me-2">
</div>
    <h2 class="text-center">Enter Admin Token</h2>
    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <!-- Token Form -->
    <form method="POST" action="/admin-token">
        <div class="mb-3">
            <label for="token" class="form-label">Admin Token</label>
            <input type="text" name="token" id="token" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Submit Token</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
