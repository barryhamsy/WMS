<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #C7C7C7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .login-container {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            max-width: 400px;
            width: 100%;
            transition: transform 0.3s ease;
        }
        .login-container:hover {
            transform: scale(1.02);
        }
        .form-control {
            border-radius: 0.5rem;
        }
        .login-btn {
            width: 100%;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: bold;
        }
        .link-btn {
            display: inline-block;
            margin: 5px;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #0d6efd;
            background-color: #e9f2ff;
            text-decoration: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .link-btn:hover {
            color: #ffffff;
            background-color: #0d6efd;
        }
        .text-muted {
            font-size: 0.9rem;
        }
        h2 {
            font-size: 2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="text-center">
    <img src="{{ url_for('static', filename='logo_.png') }}" alt="Logo" width="200" height="100" class="me-2">
</div>
    <br>
    <h2 class="text-center mb-4">Login</h2>

<!-- Display flash messages if any -->
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}

    <!-- Login Form -->
    <form method="POST" action="/login">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" name="username" id="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary login-btn">Login</button>
    </form>

    <!-- Noticeable links for Forgot Password and Register -->
    <div class="text-center mt-4">
        <a href="/forgot-password" class="link-btn">Forgot Password?</a>
        <a href="/register" class="link-btn">Register Here</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
