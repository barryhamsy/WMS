<!-- templates/edit_sku.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit SKU</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
   <style>
        body {
            background-color: #C7C7C7; /* Modern light background */
            color: #212529;
        }

        /* Updated navbar styling */
        .navbar {
            background-color: #343a40;
            padding: 15px;
        }

        .navbar-brand {
            font-weight: bold;
            color: #fff;
            font-size: 1.5rem;
        }

        .nav-link {
            color: #adb5bd;
            font-weight: 500;
        }

        .nav-link:hover {
            color: #fff;
        }

        .container {
            max-width: 1200px;
            padding-top: 40px;
        }

        .table {
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        .table th, .table td {
            vertical-align: middle;
            font-size: 0.95rem;
            padding: 1rem;
        }

        .table th {
            background-color: #495057;
            color: #fff;
        }

        .table-striped tbody tr:nth-of-type(odd) {
            background-color: #f8f9fa;
        }

        .alert {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .btn-primary, .btn-success, .btn-danger {
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover, .btn-success:hover, .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.15);
        }

        h2 {
            font-size: 2rem;
            font-weight: bold;
        }

        h4 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-top: 2rem;
        }

        .table-container {
            margin-top: 40px;
        }

        /* Responsive behavior */
        @media (max-width: 768px) {
            .table th, .table td {
                font-size: 0.85rem;
                padding: 0.75rem;
            }

            h2, h4 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <img src="{{ url_for('static', filename='logo_.png') }}" alt="Logo" width="80" height="40" class="me-2">
        <a class="navbar-brand" href="/">Inventory System</a>

        <strong class="text-white">Welcome, {{ current_user.username }}!</strong>
        <!-- Logout button as a small styled Bootstrap button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/create_racking">Racking Management</a></li>
                <li class="nav-item"><a class="nav-link" href="/stocks">Stock List</a></li>
                <li class="nav-item"><a class="nav-link" href="/sku-list">SKU List</a></li>
                <li class="nav-item"><a class="nav-link" href="/create-stock">Goods Receiving</a></li>
                <li class="nav-item"><a class="nav-link" href="/add-sku">Create SKU</a></li>
                <li class="nav-item"><a class="nav-link" href="/create-order">Create Order</a></li>
                <li class="nav-item"><a class="nav-link" href="/orders">View Orders</a></li>
            </ul>
            <form class="d-flex ms-3" action="{{ url_for('logout') }}" method="POST">
                <button class="btn btn-sm btn-outline-light" type="submit">Logout</button>
            </form>
        </div>
    </div>
</nav>
    <div class="container mt-5">
        <h1>Edit SKU</h1>
        <form action="/edit-sku/{{ sku.id }}" method="POST" class="card p-4 shadow">
            <div class="mb-3">
                <label for="material_number" class="form-label">Material Number:</label>
                <input type="text" id="material_number" name="material_number" value="{{ sku.material_number }}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label for="product_description" class="form-label">Product Description:</label>
                <input type="text" id="product_description" name="product_description" value="{{ sku.product_description }}" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="weight">Weight</label> <!-- Add this input field -->
                <input type="number" step="any" min="0" class="form-control" name="weight" value="{{ sku.weight }}" required>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <br>
            <a href="/sku-list" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
